name: Terragrunt CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  TF_VERSION: "1.7.5"
  TG_VERSION: "0.55.0" # Specify your preferred Terragrunt version here
  WORKING_DIR: envs/staging

jobs:
  validate:
    name: Format, Validate, Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false # Disabled wrapper to prevent output formatting conflicts with Terragrunt

      - uses: gruntwork-io/setup-terragrunt@v3
        with:
          terragrunt_version: ${{ env.TG_VERSION }}

      # Terragrunt has its own formatter for .hcl files
      - name: Terragrunt hclfmt (check)
        run: terragrunt hclfmt --terragrunt-check

      - name: Terragrunt init (staging env)
        working-directory: ${{ env.WORKING_DIR }}
        run: terragrunt init --terragrunt-non-interactive

      - name: Terragrunt validate (staging env)
        working-directory: ${{ env.WORKING_DIR }}
        run: terragrunt validate --terragrunt-non-interactive

      - name: Terragrunt init (basic example)
        working-directory: examples/basic
        run: terragrunt init --terragrunt-non-interactive

      - name: Terragrunt validate (basic example)
        working-directory: examples/basic
        run: terragrunt validate --terragrunt-non-interactive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive

  security-scan:
    name: Security scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Checkov natively parses Terragrunt files if framework is set to terraform or all
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false

  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - uses: gruntwork-io/setup-terragrunt@v3
        with:
          terragrunt_version: ${{ env.TG_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Terragrunt init
        working-directory: ${{ env.WORKING_DIR }}
        run: terragrunt init --terragrunt-non-interactive

      # Terragrunt forwards the plan commands and flags straight to Terraform
      - name: Terragrunt plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terragrunt plan -no-color -out=tfplan.binary --terragrunt-non-interactive 2>&1 | tee plan_output.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const output = fs.readFileSync(
              path.join(process.env.WORKING_DIR, 'plan_output.txt'),
              'utf8'
            ).slice(-60000); // GitHub comment size limit
            const body = `#### Terragrunt Plan\n<details><summary>Show plan</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });